<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#f7f8f9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>BrightScale Tracker</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* BrightScale Design System (FIXO) */
    :root{
      --accent:#22c55e;         /* Green 500 */
      --accent-strong:#16a34a;  /* Green 600 */
      --text:#1f2328;           /* Charcoal */
      --muted:#60656f;
      --bg:#f7f8f9;
      --card:#ffffff;
      --border:#e7e9ee;
      --shadow:0 12px 28px rgba(0,0,0,.08);

      /* App neutrals */
      --sf: var(--card);
      --sf2: #f2f4f7;
      --bd: var(--border);
      --tx: var(--text);
      --mu: var(--muted);

      --danger:#ef4444;
      --warn:#f59e0b;
    }

    html,body{
      height:100%;
      background:var(--bg);
      color:var(--tx);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    #app{display:flex;flex-direction:column;height:100%;}
    .main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 110px;}
    .nav{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--sf);
      border-top:1px solid var(--bd);
      display:flex;flex-direction:column;z-index:50;
      padding-bottom:env(safe-area-inset-bottom,0);
      box-shadow:0 -8px 20px rgba(0,0,0,.04);
    }
    .nav-tabs{display:flex;}
    .nav-ver{text-align:center;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--mu);padding:2px 0 6px;opacity:.85;}

    .nb{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
      padding:10px 4px 8px;
      background:none;border:none;color:var(--mu);
      font-size:10px;font-weight:700;cursor:pointer;
    }
    .nb.on{color:var(--accent);}
    .nb svg{width:22px;height:22px;display:block;}

    .hdr{padding:16px 0 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .hdr h1{font-size:22px;font-weight:800;color:var(--tx);}
    .hsub{font-size:12px;color:var(--mu);margin-top:2px;}

    .card{
      background:var(--sf);
      border:1px solid var(--bd);
      border-radius:16px;
      padding:16px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .ct{font-size:11px;font-weight:800;letter-spacing:1.2px;color:var(--mu);text-transform:uppercase;margin-bottom:12px;}
    .empty{text-align:center;padding:42px 20px;color:var(--mu);}
    .ei{font-size:44px;margin-bottom:12px;}
    .et{font-size:14px;line-height:1.8;}

    .btn{
      padding:13px 18px;border-radius:10px;border:none;
      font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;
    }
    .btn:active{opacity:.78;}

    .bp{background:var(--accent);color:var(--bg);}
    .bp:hover{background:var(--accent-strong);}
    .bs{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);}
    .br{background:rgba(239,68,68,.08);color:var(--danger);border:1px solid rgba(239,68,68,.25);}
    .bfull{width:100%;}
    .bsm{padding:9px 14px;font-size:13px;}

    .brow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

    label{display:block;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;}
    .fg{margin-bottom:16px;}

    input,select,textarea{
      width:100%;
      padding:13px 14px;
      background:var(--sf2);
      border:1px solid var(--bd);
      border-radius:10px;
      color:var(--tx);
      font-size:15px;
      font-family:inherit;
      outline:none;
      -webkit-appearance:none;
      appearance:none;
    }
    input:focus,select:focus,textarea:focus{border-color:var(--accent);}
    input[type=date]{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;}
    input::placeholder{color:var(--mu);}
    textarea{resize:vertical;min-height:80px;font-size:13px;}

    .sel-wrap{position:relative;}
    .sel-wrap::after{
      content:"▾";
      position:absolute;right:14px;top:50%;
      transform:translateY(-50%);
      color:var(--accent);
      pointer-events:none;font-size:18px;font-weight:800;
    }
    select{cursor:pointer;padding-right:36px;}

    .banner{
      background:rgba(34,197,94,.08);
      border:1px solid rgba(34,197,94,.22);
      border-radius:16px;
      padding:16px;
      margin-bottom:10px;
      position:relative;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .banner::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#9ca3af);}
    .blbl{font-size:10px;font-weight:900;letter-spacing:1.2px;color:var(--accent);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .bdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.4s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
    .bproj{font-size:19px;font-weight:900;margin-bottom:3px;color:var(--tx);}
    .bsub2{font-size:12px;color:var(--mu);}
    .btime{font-size:26px;font-weight:900;color:var(--accent);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;margin-top:6px;}

    .pi{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--bd);cursor:pointer;}
    .pi:last-child{border-bottom:none;}
    .pi:active{background:rgba(34,197,94,.06);}

    .pdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;background:var(--accent);}
    .pinfo{flex:1;}
    .pname{font-size:15px;font-weight:900;color:var(--tx);}
    .prate{font-size:12px;color:var(--mu);margin-top:3px;}
    .pstats{text-align:right;flex-shrink:0;}
    .pprog{font-size:20px;font-weight:900;color:var(--accent);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;}
    .pmeta{font-size:11px;color:var(--mu);margin-top:2px;}

    .ov{position:fixed;inset:0;background:rgba(31,35,40,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal{
      background:var(--sf);
      border:1px solid var(--bd);
      border-radius:20px 20px 0 0;
      padding:24px;
      width:100%;
      max-width:520px;
      max-height:90vh;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      box-shadow:var(--shadow);
    }
    .mtit{font-size:19px;font-weight:900;margin-bottom:18px;color:var(--tx);}

    .conf{position:fixed;inset:0;background:rgba(31,35,40,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
    .cbox{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:var(--shadow);}
    .ctit{font-size:16px;font-weight:900;margin-bottom:10px;color:var(--tx);}
    .cmsg{font-size:14px;color:var(--mu);margin-bottom:20px;line-height:1.7;}

    #tc{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:380px;}
    .tst{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:900;text-align:center;box-shadow:var(--shadow);}
    .ts{background:rgba(34,197,94,.95);color:var(--bg);}
    .te{background:rgba(239,68,68,.95);color:#fff;}
    .tw{background:rgba(245,158,11,.95);color:var(--bg);}

    .scope{margin-bottom:12px;background:var(--sf2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;}
    .scope-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;}
    .scope-hdr:active{background:rgba(34,197,94,.06);}
    .scope-title{font-size:15px;font-weight:900;display:flex;align-items:center;gap:8px;color:var(--tx);}
    .scope-arrow{font-size:12px;transition:transform .2s;color:var(--mu);}
    .scope-arrow.open{transform:rotate(90deg);}
    .scope-prog{font-size:16px;font-weight:900;color:var(--accent);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;}
    .scope-tasks{display:none;border-top:1px solid var(--bd);}
    .scope-tasks.open{display:block;}

    .task-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--bd);}
    .task-row:last-child{border-bottom:none;}
    .task-row:active{background:rgba(34,197,94,.06);}
    .task-name{flex:1;font-size:14px;color:var(--tx);}
    .task-prog{font-size:14px;font-weight:900;color:var(--accent);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;}
    .task-actions{display:flex;gap:4px;flex-shrink:0;}
    .icon-btn{background:none;border:none;padding:6px;cursor:pointer;color:var(--mu);font-size:16px;line-height:1;}
    .icon-btn:active{opacity:.65;}

    .prog-bar{height:6px;background:#e5e7eb;border-radius:3px;margin:8px 0;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#9ca3af);transition:width .3s;border-radius:3px;}

    .range-wrap{position:relative;margin:12px 0;}
    .range-val{
      text-align:center;font-size:28px;font-weight:900;
      color:var(--accent);
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      margin-bottom:8px;
    }
    input[type=range]{
      width:100%;height:8px;background:#e5e7eb;border-radius:4px;
      outline:none;-webkit-appearance:none;appearance:none;border:1px solid var(--bd);
    }
    input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;appearance:none;width:24px;height:24px;
      background:var(--accent);border-radius:50%;
      cursor:pointer;border:3px solid var(--sf);
      box-shadow:0 6px 14px rgba(0,0,0,.12);
    }
    input[type=range]::-moz-range-thumb{
      width:24px;height:24px;background:var(--accent);border-radius:50%;
      cursor:pointer;border:3px solid var(--sf);
      box-shadow:0 6px 14px rgba(0,0,0,.12);
    }

    .chips{display:flex;gap:7px;flex-wrap:wrap;}
    .chip{
      padding:7px 13px;border-radius:20px;border:1px solid var(--bd);
      background:var(--sf2);font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;color:var(--tx);
    }
    .chip:active{opacity:.75;}
    .chip.on{background:var(--accent);color:var(--bg);border-color:var(--accent);}

    .unit-stat{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);}
    .unit-stat:last-child{border-bottom:none;}
    .stat-lbl{font-size:13px;color:var(--mu);}
    .stat-val{font-size:14px;font-weight:900;color:var(--tx);}

    .countdown{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:900;}
    .countdown.ok{background:rgba(34,197,94,.14);color:var(--accent);}
    .countdown.warn{background:rgba(245,158,11,.14);color:var(--warn);}
    .countdown.late{background:rgba(239,68,68,.14);color:var(--danger);}

    .scope-actions{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap;}
  </style>
</head>

<body>
  <div id="app">
    <div class="main" id="main"></div>
    <nav class="nav" id="nav"></nav>
  </div>

  <div id="tc"></div>

  <script>
    'use strict';

    /* ========== Resiliência: nunca mais tela preta ========== */
    function showFatal(title, detail) {
      var el = document.getElementById('main');
      if (!el) return;
      el.innerHTML =
        '<div class="empty"><div class="ei">⚠️</div>' +
        '<div class="et"><b>' + esc(title) + '</b><br><br>' +
        '<span style="font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,\'Liberation Mono\',\'Courier New\',monospace;font-size:12px">' +
        esc(detail || '') +
        '</span><br><br>' +
        '<button class="btn bp bfull" onclick="location.reload()">Recarregar</button>' +
        '</div></div>';
    }

    window.onerror = function (msg, url, line, col, error) {
      console.error('Global error:', msg, 'at', url, line + ':' + col, error);
      showFatal('JavaScript Error', String(msg) + ' @ ' + line + ':' + col);
      return true;
    };

    window.addEventListener('unhandledrejection', function (event) {
      console.error('Unhandled promise rejection:', event.reason);
      var reason = event && event.reason ? (event.reason.message || String(event.reason)) : 'Unknown error';
      showFatal('Promise Error', reason);
    });

    document.addEventListener('DOMContentLoaded', function () {
      var main = document.getElementById('main');
      if (main && !main.innerHTML) {
        main.innerHTML =
          '<div class="empty"><div class="ei">⏳</div>' +
          '<div class="et">Loading BrightScale Tracker…</div></div>';
      }
    });

    /* ========== Utils ========== */
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function today() {
      var d = new Date();
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }
    function fDate(s) {
      return new Date(s + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }
    function calcDaysRemaining(deadline) {
      if (!deadline) return null;
      var d1 = new Date(deadline + 'T23:59:59');
      var d2 = new Date();
      var diff = Math.ceil((d1 - d2) / 86400000);
      return diff;
    }

    function svgI(d) {
      return '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"' +
        ' stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="' + d + '"/></svg>';
    }

    function uid() {
      return (crypto && crypto.randomUUID) ? crypto.randomUUID()
        : Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    /* ========== DOM helpers ========== */
    function el(tag, cls, html) {
      var e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html !== undefined) e.innerHTML = html;
      return e;
    }
    function div(cls, html) { return el('div', cls, html); }
    function btn(cls, text, fn) {
      var b = el('button', cls, text);
      if (fn) b.onclick = fn;
      return b;
    }
    function mkLbl(txt) {
      var l = document.createElement('label');
      l.textContent = txt;
      return l;
    }

    /* ========== Toast ========== */
    function toast(msg, type, dur) {
      type = type || 's'; dur = dur || 2800;
      var c = document.getElementById('tc');
      if (!c) return;
      var t = document.createElement('div');
      t.className = 'tst t' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(function () {
        t.style.cssText = 'opacity:0;transition:opacity .3s;';
        setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 350);
      }, dur);
    }

    /* ========== Modal / Confirm ========== */
    function showModal(fn) {
      closeModal();
      var ov = div('ov'); ov.id = 'overlay';
      var mo = div('modal');

      function close() { if (ov.parentNode) ov.parentNode.removeChild(ov); }

      fn(mo, close);
      ov.appendChild(mo);
      ov.onclick = function (e) { if (e.target === ov) close(); };
      document.body.appendChild(ov);
    }

    function closeModal() {
      var e = document.getElementById('overlay');
      if (e) e.parentNode.removeChild(e);
    }

    function showConfirm(opts) {
      var ov = div('conf'); ov.id = 'confbox';
      var box = div('cbox');
      box.appendChild(div('ctit', opts.title || 'Confirmar'));
      box.appendChild(div('cmsg', opts.msg || ''));
      var row = div('brow');

      function rm() { if (ov.parentNode) ov.parentNode.removeChild(ov); }

      var no = btn('btn bs', opts.noL || 'Cancelar', function () { rm(); if (opts.onNo) opts.onNo(); });
      no.style.flex = '1';

      var yes = btn('btn bp', opts.yesL || 'Confirmar', function () { rm(); if (opts.onYes) opts.onYes(); });
      yes.style.flex = '1';

      row.appendChild(no); row.appendChild(yes);
      box.appendChild(row); ov.appendChild(box);
      document.body.appendChild(ov);
    }

    /* ========== Templates (builtin) ========== */
    var TEMPLATES = {
      'Full Remodel': [
        { title: 'Demolition', weight: 0.1, tasks: [
          { title: 'Move Furniture', order: 1 },
          { title: 'Demo Floor', order: 2 },
          { title: 'Dumpster Cleanup', order: 3 }
        ]},
        { title: 'Painting', weight: 0.25, tasks: [
          { title: 'Preparation', order: 1 },
          { title: 'Drywall Patch', order: 2 },
          { title: 'Sanding', order: 3 },
          { title: 'Priming', order: 4 },
          { title: 'Paint Ceiling', order: 5 },
          { title: 'Paint Walls', order: 6 },
          { title: 'Paint Doors', order: 7 },
          { title: 'Baseboard', order: 8 }
        ]},
        { title: 'Tile Work', weight: 0.25, tasks: [
          { title: 'Install Flooring Tile', order: 1 },
          { title: 'Grout Flooring', order: 2 },
          { title: 'Install Mosaic', order: 3 },
          { title: 'Grout Mosaic', order: 4 },
          { title: 'Install Kitchen Backsplash', order: 5 }
        ]},
        { title: 'Assemblers', weight: 0.2, tasks: [
          { title: 'Install Plates', order: 1 },
          { title: 'Install Pedestal Sink', order: 2 },
          { title: 'Install Ceiling Fan', order: 3 },
          { title: 'Install Fixtures', order: 4 },
          { title: 'Install Thermostat', order: 5 }
        ]},
        { title: 'Electrical', weight: 0.1, tasks: [
          { title: 'Kitchen Electrical', order: 1 },
          { title: 'Bathroom Electrical', order: 2 }
        ]},
        { title: 'Final Phase', weight: 0.1, tasks: [
          { title: 'Punch List', order: 1 },
          { title: 'Final Cleaning', order: 2 }
        ]}
      ],
      'Paint Only': [
        { title: 'Painting', weight: 1.0, tasks: [
          { title: 'Preparation', order: 1 },
          { title: 'Drywall Patch', order: 2 },
          { title: 'Sanding', order: 3 },
          { title: 'Priming', order: 4 },
          { title: 'Paint Ceiling', order: 5 },
          { title: 'Paint Walls', order: 6 },
          { title: 'Paint Doors', order: 7 },
          { title: 'Baseboard', order: 8 },
          { title: 'Final Touch-up', order: 9 }
        ]}
      ],
      'Tile Only': [
        { title: 'Tile Work', weight: 1.0, tasks: [
          { title: 'Demo Old Tile', order: 1 },
          { title: 'Floor Prep', order: 2 },
          { title: 'Install Flooring Tile', order: 3 },
          { title: 'Grout Flooring', order: 4 },
          { title: 'Install Mosaic', order: 5 },
          { title: 'Grout Mosaic', order: 6 },
          { title: 'Install Kitchen Backsplash', order: 7 },
          { title: 'Final Cleanup', order: 8 }
        ]}
      ]
    };

    /* ========== IndexedDB ========== */
    var DB;

    function openDB() {
      return new Promise(function (res, rej) {
        var r = indexedDB.open('brightscale_v1', 1);
        r.onupgradeneeded = function (e) {
          var d = e.target.result;
          if (!d.objectStoreNames.contains('projects')) d.createObjectStore('projects', { keyPath: 'id' });
          if (!d.objectStoreNames.contains('units')) d.createObjectStore('units', { keyPath: 'id' });
          if (!d.objectStoreNames.contains('scopes')) d.createObjectStore('scopes', { keyPath: 'id' });
          if (!d.objectStoreNames.contains('tasks')) d.createObjectStore('tasks', { keyPath: 'id' });
        };
        r.onsuccess = function (e) { DB = e.target.result; res(); };
        r.onerror = function (e) { rej(e.target.error); };
      });
    }

    function dbAll(store) {
      return new Promise(function (res, rej) {
        var t = DB.transaction(store, 'readonly');
        var r = t.objectStore(store).getAll();
        r.onsuccess = function () { res(r.result || []); };
        r.onerror = function () { rej(r.error); };
      });
    }

    function dbPut(store, obj) {
      return new Promise(function (res, rej) {
        var t = DB.transaction(store, 'readwrite');
        var r = t.objectStore(store).put(obj);
        r.onsuccess = function () { res(r.result); };
        r.onerror = function () { rej(r.error); };
      });
    }

    function dbDel(store, id) {
      return new Promise(function (res, rej) {
        var t = DB.transaction(store, 'readwrite');
        var r = t.objectStore(store).delete(id);
        r.onsuccess = function () { res(); };
        r.onerror = function () { rej(r.error); };
      });
    }

    /* ========== State ========== */
    var S = {
      tab: 'projects',
      projects: [],
      units: [],
      scopes: [],
      tasks: [],
      currentProjectId: null,
      currentUnitId: null
    };

    /* ========== Calculations ========== */
    function calcScopeProgress(scopeId) {
      var tasks = S.tasks.filter(function (t) { return t.scopeId === scopeId; });
      if (!tasks.length) return 0;
      var sum = tasks.reduce(function (a, t) { return a + (t.progress || 0); }, 0);
      return Math.round(sum / tasks.length);
    }

    function calcUnitProgress(unitId) {
      var scopes = S.scopes.filter(function (s) { return s.unitId === unitId; });
      if (!scopes.length) return 0;
      var totalWeight = scopes.reduce(function (a, s) { return a + (s.weight || 0); }, 0);
      if (totalWeight === 0) return 0;
      var weightedSum = scopes.reduce(function (a, s) {
        var prog = calcScopeProgress(s.id);
        return a + (prog * (s.weight || 0));
      }, 0);
      return Math.round(weightedSum / totalWeight);
    }

    function calcProjectProgress(projectId) {
      var units = S.units.filter(function (u) { return u.projectId === projectId; });
      if (!units.length) return 0;
      var sum = units.reduce(function (a, u) { return a + calcUnitProgress(u.id); }, 0);
      return Math.round(sum / units.length);
    }

          reader.readAsText(file);
        };

    function openProjectForm(proj) {
      showModal(function (mo, close) {
        mo.appendChild(div('mtit', proj ? 'Editar Projeto' : 'Novo Projeto'));

        var f1 = div('fg');
        f1.appendChild(mkLbl('Nome do Projeto'));
        var ni = el('input', '');
        ni.type = 'text';
        ni.placeholder = 'ex: NEW CASTLE MIAMI';
        if (proj) ni.value = proj.name || '';
        f1.appendChild(ni);
        mo.appendChild(f1);

        var f2 = div('fg');
        f2.appendChild(mkLbl('Endereço (opcional)'));
        var ai = el('input', '');
        ai.type = 'text';
        ai.placeholder = 'ex: 123 Main St, Miami, FL';
        if (proj) ai.value = proj.address || '';
        f2.appendChild(ai);
        mo.appendChild(f2);

        var f3 = div('fg');
        f3.appendChild(mkLbl('Cliente (opcional)'));
        var ci = el('input', '');
        ci.type = 'text';
        ci.placeholder = 'Nome do cliente';
        if (proj && proj.client) ci.value = proj.client.name || '';
        f3.appendChild(ci);
        mo.appendChild(f3);

        var f4 = div('fg');
        f4.appendChild(mkLbl('Contato do Cliente (opcional)'));
        var cti = el('input', '');
        cti.type = 'text';
        cti.placeholder = 'Telefone ou email';
        if (proj && proj.client) cti.value = proj.client.contact || '';
        f4.appendChild(cti);
        mo.appendChild(f4);

        var row = div('brow');
        var cb = btn('btn bs', 'Cancelar', close); cb.style.flex = '1';
        var sb = btn('btn bp', 'Salvar', function () {
          var nm = ni.value.trim();
          if (!nm) { toast('Nome do projeto é obrigatório', 'w'); return; }

          var now = new Date().toISOString();
          dbPut('projects', {
            id: proj ? proj.id : uid(),
            name: nm,
            address: ai.value.trim(),
            client: { name: ci.value.trim(), contact: cti.value.trim() },
            createdAt: proj ? proj.createdAt : now,
            updatedAt: now
          }).then(reload).then(function () {
            close();
            toast(proj ? 'Projeto atualizado' : 'Projeto "' + nm + '" criado');
          }).catch(function (err) {
            console.error('Erro ao salvar projeto:', err);
            toast('Erro ao salvar: ' + (err && err.message ? err.message : String(err)), 'e', 4000);
          });
        });
        sb.style.flex = '1';

        row.appendChild(cb);
        row.appendChild(sb);
        mo.appendChild(row);

        setTimeout(function () { ni.focus(); }, 200);
      });
    }

          row.appendChild(delb);
        }

        var cb = btn('btn bs', 'Cancelar', close); cb.style.flex = '1';

        var sb = btn('btn bp', 'Salvar', function () {
          var num = ni.value.trim();
          if (!num) { toast('Número da unit é obrigatório', 'w'); return; }
          if (!unit && templateType === 'custom' && !customTemplate) {
            toast('Carregue um template JSON ou escolha um padrão', 'w');
            return;
          }

          var now = new Date().toISOString();
          var unitId = unit ? unit.id : uid();

          dbPut('units', {
            id: unitId,
            projectId: projectId,
            unitNumber: num,
            bdBa: bi.value.trim(),
            invoice: ii.value.trim(),
            startDate: si.value,
            deadline: di.value,
            supervisors: {
              demo: sd.value.trim(),
              painter: sp.value.trim(),
              tile: st.value.trim(),
              assembler: sa.value.trim()
            },
            createdAt: unit ? unit.createdAt : now,
            updatedAt: now
          }).then(function () {
            if (!unit) {
              var template;
              if (templateType === 'custom' && customTemplate) template = customTemplate;
              else {
                var tsel = document.getElementById('builtin-template-select');
                template = TEMPLATES[tsel && tsel.value ? tsel.value : Object.keys(TEMPLATES)[0]];
              }

              var promises = [];
              template.forEach(function (scopeTpl, idx) {
                var scopeId = uid();
                promises.push(dbPut('scopes', {
                  id: scopeId,
                  unitId: unitId,
                  title: scopeTpl.title,
                  order: scopeTpl.order || (idx + 1),
                  weight: scopeTpl.weight,
                  createdAt: now,
                  updatedAt: now
                }));

                if (scopeTpl.tasks && scopeTpl.tasks.length) {
                  scopeTpl.tasks.forEach(function (taskTpl) {
                    promises.push(dbPut('tasks', {
                      id: uid(),
                      scopeId: scopeId,
                      title: taskTpl.title,
                      order: taskTpl.order,
                      progress: 0,
                      status: 'pending',
                      createdAt: now,
                      updatedAt: now
                    }));
                  });
                }
              });
              return Promise.all(promises);
            }
          }).then(function () {
            if (!unit) S.currentUnitId = unitId;
            return reload();
          }).then(function () {
            close();
            toast(unit ? 'Unit atualizada' : 'Unit criada com sucesso!');
          }).catch(function (err) {
            console.error('Erro ao salvar unit:', err);
            toast('Erro ao salvar: ' + (err && err.message ? err.message : String(err)), 'e', 5000);
          });
        });
        sb.style.flex = '1';

        row.appendChild(cb);
        row.appendChild(sb);
        mo.appendChild(row);

        setTimeout(function () { ni.focus(); }, 200);
      });
    }

    function openImportTemplate(unitId) {
      showModal(function (mo, close) {
        mo.appendChild(div('mtit', 'Importar Template'));

        var tabsDiv = div('');
        tabsDiv.style.cssText = 'margin-bottom:16px;';
        var chips = div('chips');
        var activeTab = 'builtin';

        var builtinChip = btn('chip on', 'Templates Padrão', function () {
          activeTab = 'builtin';
          builtinChip.className = 'chip on';
          customChip.className = 'chip';
          fileChip.className = 'chip';
          renderTemplateContent();
        });

        var customChip = btn('chip', 'Colar JSON', function () {
          activeTab = 'custom';
          builtinChip.className = 'chip';
          customChip.className = 'chip on';
          fileChip.className = 'chip';
          renderTemplateContent();
        });

        var fileChip = btn('chip', 'Upload Arquivo', function () {
          activeTab = 'file';
          builtinChip.className = 'chip';
          customChip.className = 'chip';
          fileChip.className = 'chip on';
          renderTemplateContent();
        });

        chips.appendChild(builtinChip);
        chips.appendChild(customChip);
        chips.appendChild(fileChip);
        tabsDiv.appendChild(chips);
        mo.appendChild(tabsDiv);

        var contentDiv = div('');
        contentDiv.id = 'template-content';
        mo.appendChild(contentDiv);

        function importTemplateToUnit(unitId, template) {
          if (!Array.isArray(template) || template.length === 0) {
            toast('Template vazio ou inválido', 'e');
            return;
          }

          var now = new Date().toISOString();
          var promises = [];
          var maxOrder = S.scopes.filter(function (s) { return s.unitId === unitId; })
            .reduce(function (max, s) { return Math.max(max, s.order || 0); }, 0);

          template.forEach(function (scopeTpl, idx) {
            if (!scopeTpl.title) return;

            var scopeId = uid();
            promises.push(dbPut('scopes', {
              id: scopeId,
              unitId: unitId,
              title: scopeTpl.title,
              order: maxOrder + idx + 1,
              weight: (typeof scopeTpl.weight === 'number') ? scopeTpl.weight : 0.1,
              createdAt: now,
              updatedAt: now
            }));

            if (scopeTpl.tasks && Array.isArray(scopeTpl.tasks)) {
              scopeTpl.tasks.forEach(function (taskTpl) {
                if (!taskTpl.title) return;
                promises.push(dbPut('tasks', {
                  id: uid(),
                  scopeId: scopeId,
                  title: taskTpl.title,
                  order: taskTpl.order || 1,
                  progress: 0,
                  status: 'pending',
                  createdAt: now,
                  updatedAt: now
                }));
              });
            }
          });

          Promise.all(promises).then(reload).then(function () {
            close();
            toast('Template importado: ' + template.length + ' scope(s) criado(s)');
          });
        }

        function renderTemplateContent() {
          contentDiv.innerHTML = '';

          if (activeTab === 'builtin') {
            var info = div('');
            info.style.cssText = 'font-size:13px;color:var(--mu);margin-bottom:12px;';
            info.textContent = 'Selecione um template pré-definido:';
            contentDiv.appendChild(info);

            var fg = div('fg');
            fg.style.marginBottom = '0';
            var sw = div('sel-wrap');
            var sel = document.createElement('select');
            Object.keys(TEMPLATES).forEach(function (k) {
              var o = document.createElement('option');
              o.value = k;
              o.textContent = k;
              sel.appendChild(o);
            });
            sw.appendChild(sel);
            fg.appendChild(sw);
            contentDiv.appendChild(fg);

            var row = div('brow');
            var cb = btn('btn bs', 'Cancelar', close); cb.style.flex = '1';
            var importBtn = btn('btn bp', 'Importar Template', function () {
              importTemplateToUnit(unitId, TEMPLATES[sel.value]);
            });
            importBtn.style.flex = '1';

            row.appendChild(cb);
            row.appendChild(importBtn);
            contentDiv.appendChild(row);

          } else if (activeTab === 'custom') {
            var info2 = div('');
            info2.style.cssText = 'font-size:13px;color:var(--mu);margin-bottom:12px;';
            info2.innerHTML = 'Cole o JSON do template abaixo:<br><span style="font-size:11px">Formato: array de scopes com tasks</span>';
            contentDiv.appendChild(info2);

            var ta = document.createElement('textarea');
            ta.style.cssText =
              'width:100%;height:200px;background:var(--sf2);border:1px solid var(--bd);' +
              'border-radius:10px;color:var(--tx);font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;' +
              'padding:12px;outline:none;resize:vertical;';
            ta.placeholder = '[\n  {\n    "title": "Custom Scope",\n    "weight": 0.3,\n    "tasks": [\n      {"title": "Task 1", "order": 1}\n    ]\n  }\n]';
            contentDiv.appendChild(ta);

            var row2 = div('brow');
            var cb2 = btn('btn bs', 'Cancelar', close); cb2.style.flex = '1';
            var importBtn2 = btn('btn bp', 'Importar', function () {
              try {
                var template = JSON.parse(ta.value.trim());
                if (!Array.isArray(template)) throw new Error('Template deve ser um array');
                importTemplateToUnit(unitId, template);
              } catch (err) {
                toast('JSON inválido: ' + err.message, 'e', 4000);
              }
            });
            importBtn2.style.flex = '1';

            row2.appendChild(cb2);
            row2.appendChild(importBtn2);
            contentDiv.appendChild(row2);

          } else if (activeTab === 'file') {
            var info3 = div('');
            info3.style.cssText = 'font-size:13px;color:var(--mu);margin-bottom:16px;';
            info3.textContent = 'Selecione um arquivo JSON de template:';
            contentDiv.appendChild(info3);

            var fileBtn = btn('btn bp bfull', '📁 Escolher Arquivo JSON', function () {
              var input = document.createElement('input');
              input.type = 'file';
              input.accept = '.json,application/json';
              input.onchange = function (e) {
                var file = e.target.files[0];
                if (!file) return;

                var reader = new FileReader();
                reader.onload = function (event) {
                  try {
                    var template = JSON.parse(event.target.result);
                    if (!Array.isArray(template)) throw new Error('Template deve ser um array');
                    importTemplateToUnit(unitId, template);
                  } catch (err) {
                    toast('Arquivo JSON inválido: ' + err.message, 'e', 4000);
                  }
                };
                reader.onerror = function () { toast('Erro ao ler arquivo', 'e'); };
                reader.readAsText(file);
              };
              input.click();
            });

            contentDiv.appendChild(fileBtn);
            contentDiv.appendChild(div('brow')).appendChild(btn('btn bs bfull', 'Cancelar', close));
          }
        }

        renderTemplateContent();
      });
    }

    function openScopeForm(unitId, scope) {
      showModal(function (mo, close) {
        mo.appendChild(div('mtit', scope ? 'Editar Scope' : 'Novo Scope'));

        var f1 = div('fg');
        f1.appendChild(mkLbl('Título do Scope'));
        var ti = el('input', '');
        ti.type = 'text';
        ti.placeholder = 'ex: Painting, Tile Work, Demolition';
        if (scope) ti.value = scope.title || '';
        f1.appendChild(ti);
        mo.appendChild(f1);

        var f2 = div('fg');
        f2.appendChild(mkLbl('Peso (0.0 - 1.0)'));
        var wi = el('input', '');
        wi.type = 'number';
        wi.step = '0.05';
        wi.min = '0';
        wi.max = '1';
        wi.placeholder = 'ex: 0.25';
        wi.value = scope ? (scope.weight ?? 0.1) : 0.1;
        f2.appendChild(wi);
        mo.appendChild(f2);

        var f3 = div('fg');
        f3.appendChild(mkLbl('Ordem'));
        var oi = el('input', '');
        oi.type = 'number';
        oi.min = '1';
        oi.placeholder = 'ex: 1';
        if (scope) oi.value = scope.order || 1;
        else {
          var maxOrder = S.scopes.filter(function (s) { return s.unitId === unitId; })
            .reduce(function (max, s) { return Math.max(max, s.order || 0); }, 0);
          oi.value = maxOrder + 1;
        }
        f3.appendChild(oi);
        mo.appendChild(f3);

        var row = div('brow');
        var cb = btn('btn bs', 'Cancelar', close); cb.style.flex = '1';
        var sb = btn('btn bp', 'Salvar', function () {
          var title = ti.value.trim();
          if (!title) { toast('Título é obrigatório', 'w'); return; }

          var weight = parseFloat(wi.value);
          if (isNaN(weight) || weight < 0 || weight > 1) { toast('Peso deve estar entre 0 e 1', 'w'); return; }

          var order = parseInt(oi.value, 10);
          if (isNaN(order) || order < 1) { toast('Ordem inválida', 'w'); return; }

          var now = new Date().toISOString();
          dbPut('scopes', {
            id: scope ? scope.id : uid(),
            unitId: unitId,
            title: title,
            order: order,
            weight: weight,
            createdAt: scope ? scope.createdAt : now,
            updatedAt: now
          }).then(reload).then(function () {
            close();
            toast(scope ? 'Scope atualizado' : 'Scope criado');
          });
        });
        sb.style.flex = '1';

        row.appendChild(cb);
        row.appendChild(sb);
        mo.appendChild(row);

        setTimeout(function () { ti.focus(); }, 200);
      });
    }

    function openTaskForm(scopeId, task) {
      showModal(function (mo, close) {
        mo.appendChild(div('mtit', task ? 'Editar Task' : 'Nova Task'));

        var f1 = div('fg');
        f1.appendChild(mkLbl('Nome da Task'));
        var ni = el('input', '');
        ni.type = 'text';
        ni.placeholder = 'ex: Prime, Install Flooring';
        if (task) ni.value = task.title || '';
        f1.appendChild(ni);
        mo.appendChild(f1);

        var f2 = div('fg');
        f2.appendChild(mkLbl('Ordem'));
        var oi = el('input', '');
        oi.type = 'number';
        oi.min = '1';
        oi.placeholder = 'ex: 1';
        if (task) oi.value = task.order || 1;
        else {
          var maxOrder = S.tasks.filter(function (t) { return t.scopeId === scopeId; })
            .reduce(function (max, t) { return Math.max(max, t.order || 0); }, 0);
          oi.value = maxOrder + 1;
        }
        f2.appendChild(oi);
        mo.appendChild(f2);

        var ri = null;

        if (task) {
          var f3 = div('fg');
          f3.appendChild(mkLbl('Progresso'));
          var rw = div('range-wrap');
          var rv = div('range-val', (task.progress || 0) + '%');
          ri = el('input', '');
          ri.type = 'range';
          ri.min = '0';
          ri.max = '100';
          ri.step = '5';
          ri.value = task.progress || 0;
          ri.oninput = function () { rv.textContent = ri.value + '%'; };
          rw.appendChild(rv);
          rw.appendChild(ri);
          f3.appendChild(rw);
          mo.appendChild(f3);
        }

        var row = div('brow');
        var cb = btn('btn bs', 'Cancelar', close); cb.style.flex = '1';
        var sb = btn('btn bp', 'Salvar', function () {
          var name = ni.value.trim();
          if (!name) { toast('Nome é obrigatório', 'w'); return; }

          var order = parseInt(oi.value, 10);
          if (isNaN(order) || order < 1) { toast('Ordem inválida', 'w'); return; }

          var progress = task && ri ? parseInt(ri.value, 10) : 0;
          var status = progress === 0 ? 'pending' : progress === 100 ? 'completed' : 'in_progress';

          var now = new Date().toISOString();
          dbPut('tasks', {
            id: task ? task.id : uid(),
            scopeId: scopeId,
            title: name,
            order: order,
            progress: progress,
            contractor: task ? (task.contractor || '') : '',
            deadline: task ? (task.deadline || '') : '',
            status: status,
            createdAt: task ? task.createdAt : now,
            updatedAt: now
          }).then(reload).then(function () {
            close();
            toast(task ? 'Task atualizada' : 'Task criada');
          });
        });
        sb.style.flex = '1';

        row.appendChild(cb);
        row.appendChild(sb);
        mo.appendChild(row);

        setTimeout(function () { ni.focus(); }, 200);
      });
    }

    function openTaskEdit(task) {
      showModal(function (mo, close) {
        mo.appendChild(div('mtit', 'Editar: ' + task.title));

        var rw = div('range-wrap');
        var rv = div('range-val', (task.progress || 0) + '%');
        var ri = el('input', '');
        ri.type = 'range';
        ri.min = '0';
        ri.max = '100';
        ri.step = '5';
        ri.value = task.progress || 0;

        var pb = div('prog-bar');
        var pf = div('prog-fill');
        pf.style.width = (task.progress || 0) + '%';
        pb.appendChild(pf);

        ri.oninput = function () {
          rv.textContent = ri.value + '%';
          pf.style.width = ri.value + '%';
        };

        rw.appendChild(rv);
        rw.appendChild(ri);
        mo.appendChild(rw);
        mo.appendChild(pb);

        var f1 = div('fg');
        f1.appendChild(mkLbl('Responsável (opcional)'));
        var ci = el('input', '');
        ci.type = 'text';
        ci.placeholder = 'ex: ANGELO';
        if (task.contractor) ci.value = task.contractor;
        f1.appendChild(ci);
        mo.appendChild(f1);

        var f2 = div('fg');
        f2.appendChild(mkLbl('Deadline (opcional)'));
        var di = el('input', '');
        di.type = 'date';
        if (task.deadline) di.value = task.deadline;
        f2.appendChild(di);
        mo.appendChild(f2);

        var row = div('brow');
        var cb = btn('btn bs', 'Cancelar', close); cb.style.flex = '1';
        var sb = btn('btn bp', 'Salvar', function () {
          var prog = parseInt(ri.value, 10);
          var status = prog === 0 ? 'pending' : prog === 100 ? 'completed' : 'in_progress';

          dbPut('tasks', {
            id: task.id,
            scopeId: task.scopeId,
            title: task.title,
            order: task.order,
            progress: prog,
            contractor: ci.value.trim(),
            deadline: di.value,
            status: status,
            createdAt: task.createdAt,
            updatedAt: new Date().toISOString()
          }).then(reload).then(function () {
            close();
            toast('Progresso atualizado!');
          });
        });
        sb.style.flex = '1';

        row.appendChild(cb);
        row.appendChild(sb);
        mo.appendChild(row);
      });
    }

    /* ========== Boot ========== */
    openDB()
      .then(function () { return reload(); })
      .catch(function (err) {
        console.error(err);
        showFatal('Erro ao abrir banco', (err && err.message) ? err.message : String(err));
      });
  </script>
</body>
</html>
