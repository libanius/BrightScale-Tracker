<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>BrightScale Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0a0f;--sf:#13131a;--sf2:#1c1c27;--bd:#2a2a38;--ac:#00e5a0;--ac2:#7c6bff;--ac3:#ff6b6b;--tx:#f0f0f8;--mu:#6b6b8a;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;min-height:100vh;}
.container{max-width:1200px;margin:0 auto;}
.header{text-align:center;padding:40px 0 30px;}
.header h1{font-size:32px;font-weight:700;margin-bottom:8px;}
.header .subtitle{font-size:14px;color:var(--mu);}
.logo{font-size:48px;margin-bottom:16px;}
.updated{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px;text-align:center;font-size:13px;color:var(--mu);margin-bottom:30px;}
.project-card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:24px;margin-bottom:20px;}
.project-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bd);}
.project-name{font-size:24px;font-weight:700;}
.project-meta{font-size:13px;color:var(--mu);margin-top:4px;}
.project-progress{font-size:36px;font-weight:700;color:var(--ac);font-family:monospace;}
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.unit-card{background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.unit-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ac),var(--ac2));}
.unit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.unit-number{font-size:18px;font-weight:700;}
.unit-progress{font-size:24px;font-weight:700;color:var(--ac);font-family:monospace;}
.unit-meta{font-size:12px;color:var(--mu);margin-bottom:8px;}
.deadline{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px;}
.deadline.ok{background:rgba(0,229,160,.12);color:var(--ac);}
.deadline.warn{background:rgba(255,185,60,.12);color:#ffb93c;}
.deadline.late{background:rgba(255,107,107,.12);color:var(--ac3);}
.progress-bar{height:8px;background:var(--sf);border-radius:10px;overflow:hidden;margin-top:12px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .3s ease;}
.scope-item{padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;}
.scope-item:last-child{border-bottom:none;}
.scope-name{font-weight:600;margin-bottom:4px;}
.scope-progress{color:var(--ac);font-family:monospace;float:right;}
.empty{text-align:center;padding:60px 20px;color:var(--mu);}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:.5;}
.supervisors{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);}
.supervisor-row{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-bottom:4px;}
.supervisor-label{font-weight:600;}
.footer{text-align:center;padding:40px 20px;color:var(--mu);font-size:12px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:30px;}
.stat-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;text-align:center;}
.stat-value{font-size:32px;font-weight:700;color:var(--ac);font-family:monospace;}
.stat-label{font-size:12px;color:var(--mu);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.task-list{margin-top:16px;border-top:1px solid var(--bd);padding-top:12px;}
.task-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:4px;background:var(--bg);border-radius:8px;}
.task-status{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;}
.task-status.done{background:rgba(0,229,160,.15);color:var(--ac);}
.task-status.progress{background:rgba(255,185,60,.15);color:#ffb93c;}
.task-status.pending{background:rgba(107,107,138,.15);color:var(--mu);}
.chart-container{margin:20px 0;padding:16px;background:var(--sf2);border-radius:12px;}
.chart-bar{height:24px;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:12px;position:relative;margin-bottom:8px;}
.chart-label{font-size:11px;color:var(--mu);margin-bottom:4px;display:flex;justify-content:space-between;}
.version-badge{position:fixed;bottom:20px;right:20px;padding:8px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:20px;font-size:11px;color:var(--mu);}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="brightscale-icon-192.png" class="dash-logo" alt="BrightScale" onerror="this.style.display='none'"/>
    <h1>BrightScale Dashboard</h1>
    <div class="subtitle">Project Progress Overview</div>
  </div>
  
  <div id="content"></div>
  
  <div class="footer">
    BrightScale Tracker &copy; 2025 &middot; Real-time Project Management
  </div>
  
  <div class="version-badge">v7.4</div>
</div>

<script>
'use strict';

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function loadData() {
  var params = new URLSearchParams(window.location.search);
  var dataParam = params.get('data');
  
  // Try to load from URL parameter first (legacy support)
  if (dataParam) {
    try {
      var decoded = atob(dataParam);
      return Promise.resolve(JSON.parse(decoded));
    } catch(e) {
      console.error('Error parsing URL data:', e);
    }
  }
  
  // Load from GitHub JSON file
  var jsonUrl = window.location.origin + window.location.pathname.replace('dashboard.html', 'dashboard-data.json');
  
  return fetch(jsonUrl + '?t=' + Date.now()) // Cache buster
    .then(function(res) {
      if (!res.ok) throw new Error('Failed to load data');
      return res.json();
    })
    .catch(function(err) {
      console.error('Error loading dashboard data:', err);
      return null;
    });
}

function calcScopeProgress(scopes, tasks, scopeId) {
  var scopeTasks = tasks.filter(function(t) { return t.scopeId === scopeId; });
  if (!scopeTasks.length) return 0;
  var total = scopeTasks.reduce(function(sum, t) { return sum + (t.progress || 0); }, 0);
  return Math.round(total / scopeTasks.length);
}

function calcUnitProgress(scopes, tasks, unitId) {
  var unitScopes = scopes.filter(function(s) { return s.unitId === unitId; });
  if (!unitScopes.length) return 0;
  var totalWeight = unitScopes.reduce(function(sum, s) { return sum + (s.weight || 0); }, 0);
  if (totalWeight === 0) return 0;
  var weighted = unitScopes.reduce(function(sum, s) {
    var prog = calcScopeProgress(scopes, tasks, s.id);
    return sum + (prog * (s.weight || 0));
  }, 0);
  return Math.round(weighted / totalWeight);
}

function calcProjectProgress(units, scopes, tasks, projectId) {
  var projectUnits = units.filter(function(u) { return u.projectId === projectId; });
  if (!projectUnits.length) return 0;
  var total = projectUnits.reduce(function(sum, u) {
    return sum + calcUnitProgress(scopes, tasks, u.id);
  }, 0);
  return Math.round(total / projectUnits.length);
}

function calcDaysRemaining(deadline) {
  if (!deadline) return null;
  var now = new Date();
  now.setHours(0,0,0,0);
  var due = new Date(deadline + 'T00:00:00');
  var diff = Math.ceil((due - now) / 86400000);
  return diff;
}

function render(data) {
  var content = document.getElementById('content');
  
  if (!data || !data.projects) {
    content.innerHTML = '<div class="empty">' +
      '<div class="empty-icon">📊</div>' +
      '<div style="font-size:18px;font-weight:700;margin-bottom:12px">Dashboard Setup Required</div>' +
      '<div style="max-width:500px;margin:0 auto;line-height:1.7">' +
      'To display project data, you need to:<br><br>' +
      '1. Open the <b>BrightScale Tracker</b> app<br>' +
      '2. Configure your <b>GitHub Token</b> in Settings<br>' +
      '3. Go to <b>Reports</b> and click <b>"☁️ Sync Now"</b><br><br>' +
      'Or manually create a <code>dashboard-data.json</code> file in your repository.<br><br>' +
      '<a href="index.html" style="color:var(--ac);text-decoration:none;font-weight:700">→ Open BrightScale Tracker App</a>' +
      '</div></div>';
    return;
  }
  
  var projects = data.projects || [];
  var units = data.units || [];
  var scopes = data.scopes || [];
  var tasks = data.tasks || [];
  var updatedAt = data.updatedAt || new Date().toISOString();
  
  // Updated timestamp
  var html = '<div class="updated">Last updated: ' + 
    new Date(updatedAt).toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: 'numeric', minute: '2-digit'
    }) + '</div>';
  
  // Stats
  var totalUnits = units.length;
  var completedUnits = units.filter(function(u) {
    return calcUnitProgress(scopes, tasks, u.id) === 100;
  }).length;
  var avgProgress = units.length ? Math.round(
    units.reduce(function(sum, u) {
      return sum + calcUnitProgress(scopes, tasks, u.id);
    }, 0) / units.length
  ) : 0;
  
  html += '<div class="stats">';
  html += '<div class="stat-card"><div class="stat-value">' + projects.length + '</div>' +
    '<div class="stat-label">Projects</div></div>';
  html += '<div class="stat-card"><div class="stat-value">' + totalUnits + '</div>' +
    '<div class="stat-label">Total Units</div></div>';
  html += '<div class="stat-card"><div class="stat-value">' + completedUnits + '</div>' +
    '<div class="stat-label">Completed</div></div>';
  html += '<div class="stat-card"><div class="stat-value">' + avgProgress + '%</div>' +
    '<div class="stat-label">Avg Progress</div></div>';
  html += '</div>';
  
  // Projects
  if (!projects.length) {
    html += '<div class="empty"><div class="empty-icon">🏗️</div>' +
      '<div>No projects found</div></div>';
  }
  
  projects.forEach(function(project) {
    var projectUnits = units.filter(function(u) { return u.projectId === project.id; });
    var projectProgress = calcProjectProgress(units, scopes, tasks, project.id);
    
    html += '<div class="project-card">';
    html += '<div class="project-header">';
    html += '<div><div class="project-name">' + esc(project.name) + '</div>';
    if (project.address) {
      html += '<div class="project-meta">📍 ' + esc(project.address) + '</div>';
    }
    if (project.client && project.client.name) {
      html += '<div class="project-meta">👤 ' + esc(project.client.name) + '</div>';
    }
    html += '</div>';
    html += '<div class="project-progress">' + projectProgress + '%</div>';
    html += '</div>';
    
    // Progress Chart
    if (projectUnits.length > 0) {
      html += '<div class="chart-container">';
      html += '<div style="font-size:11px;font-weight:700;color:var(--mu);margin-bottom:12px;text-transform:uppercase">📊 Units Progress</div>';
      projectUnits.forEach(function(u) {
        var uProgress = calcUnitProgress(scopes, tasks, u.id);
        html += '<div class="chart-label"><span>Unit #' + esc(u.unitNumber) + '</span><span>' + uProgress + '%</span></div>';
        html += '<div style="height:8px;background:var(--bd);border-radius:4px;overflow:hidden;margin-bottom:12px">';
        html += '<div class="chart-bar" style="width:' + uProgress + '%;height:100%"></div></div>';
      });
      html += '</div>';
    }
    
    if (!projectUnits.length) {
      html += '<div style="text-align:center;padding:20px;color:var(--mu)">No units in this project</div>';
    } else {
      html += '<div class="units-grid">';
      
      projectUnits.forEach(function(unit) {
        var unitProgress = calcUnitProgress(scopes, tasks, unit.id);
        var days = calcDaysRemaining(unit.deadline);
        var deadlineClass = days === null ? '' : days < 0 ? 'late' : days <= 3 ? 'warn' : 'ok';
        var deadlineText = days === null ? '' : days < 0 ? 
          ('Overdue ' + Math.abs(days) + 'd') : days === 0 ? 'Due Today' : days + ' days left';
        
        html += '<div class="unit-card">';
        html += '<div class="unit-header">';
        html += '<div class="unit-number">Unit #' + esc(unit.unitNumber) + '</div>';
        html += '<div class="unit-progress">' + unitProgress + '%</div>';
        html += '</div>';
        
        if (unit.bdBa) {
          html += '<div class="unit-meta">🏠 ' + esc(unit.bdBa) + '</div>';
        }
        if (unit.invoice) {
          html += '<div class="unit-meta">📄 Invoice: ' + esc(unit.invoice) + '</div>';
        }
        if (unit.startDate) {
          html += '<div class="unit-meta">📅 Started: ' + 
            new Date(unit.startDate).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) +
            '</div>';
        }
        
        html += '<div class="progress-bar"><div class="progress-fill" style="width:' + 
          unitProgress + '%"></div></div>';
        
        if (deadlineText) {
          html += '<div class="deadline ' + deadlineClass + '">⏰ ' + deadlineText + '</div>';
        }
        
        // Supervisors
        if (unit.supervisors && (unit.supervisors.demo || unit.supervisors.painter || 
            unit.supervisors.tile || unit.supervisors.assembler)) {
          html += '<div class="supervisors">';
          if (unit.supervisors.demo) {
            html += '<div class="supervisor-row"><span class="supervisor-label">Demo:</span>' +
              '<span>' + esc(unit.supervisors.demo) + '</span></div>';
          }
          if (unit.supervisors.painter) {
            html += '<div class="supervisor-row"><span class="supervisor-label">Painter:</span>' +
              '<span>' + esc(unit.supervisors.painter) + '</span></div>';
          }
          if (unit.supervisors.tile) {
            html += '<div class="supervisor-row"><span class="supervisor-label">Tile:</span>' +
              '<span>' + esc(unit.supervisors.tile) + '</span></div>';
          }
          if (unit.supervisors.assembler) {
            html += '<div class="supervisor-row"><span class="supervisor-label">Assembler:</span>' +
              '<span>' + esc(unit.supervisors.assembler) + '</span></div>';
          }
          html += '</div>';
        }
        
        // Tasks by Scope
        var unitScopes = scopes.filter(function(s) { return s.unitId === unit.id; })
          .sort(function(a,b) { return (a.order || 0) - (b.order || 0); });
        
        if (unitScopes.length > 0) {
          html += '<div class="task-list">';
          html += '<div style="font-size:11px;font-weight:700;color:var(--mu);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">📋 Scopes & Tasks</div>';
          
          unitScopes.forEach(function(scope) {
            var scopeTasks = tasks.filter(function(t) { return t.scopeId === scope.id; })
              .sort(function(a,b) { return (a.order || 0) - (b.order || 0); });
            var scopeProgress = calcScopeProgress(scopes, tasks, scope.id);
            
            html += '<div style="margin-bottom:12px">';
            html += '<div style="font-size:12px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">';
            html += '<span>' + esc(scope.title) + '</span>';
            html += '<span style="color:var(--ac);font-family:monospace">' + scopeProgress + '%</span>';
            html += '</div>';
            
            if (scopeTasks.length > 0) {
              scopeTasks.forEach(function(task) {
                var status = task.progress === 100 ? 'done' : task.progress > 0 ? 'progress' : 'pending';
                var statusLabel = task.progress === 100 ? '✓ Done' : task.progress > 0 ? task.progress + '%' : 'Pending';
                
                html += '<div class="task-item">';
                html += '<span style="font-size:11px">' + esc(task.title) + '</span>';
                html += '<span class="task-status ' + status + '">' + statusLabel + '</span>';
                html += '</div>';
              });
            }
            html += '</div>';
          });
          
          html += '</div>';
        }
        
        html += '</div>';
      });
      
      html += '</div>';
    }
    
    html += '</div>';
  });
  
  content.innerHTML = html;
}

// Boot
loadData().then(function(data) {
  render(data);
});
</script>
</body>
</html>
